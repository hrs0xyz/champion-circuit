services:
  - type: web
    name: champion-circuit-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false   # set manually in Render dashboard
      - key: BACKEND_CORS_ORIGINS
        sync: false   # e.g. https://your-app.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false   # your render URL e.g. https://champion-circuit-api.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: UPLOAD_DIR
        value: uploads
